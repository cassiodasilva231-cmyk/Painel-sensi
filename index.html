<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SensPro Elite</title>

<style>
body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:8px;
color:white;
cursor:pointer;
}

input{
padding:10px;
width:100%;
margin-top:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

.admin{
display:none;
}

.code{
font-weight:bold;
color:#22c55e;
}

.video{
width:100%;
border-radius:10px;
}

.rank{
background:#020617;
padding:10px;
margin-top:10px;
border-radius:8px;
}
</style>
</head>

<body>

<header>SensPro Elite</header>

<div class="container">

<div class="card">
<h2>Detecção do celular</h2>
<p id="device"></p>
</div>

<div class="card">
<h2>HUD recomendado</h2>
<p id="hud"></p>
</div>

<div class="card">
<h2>Dicas importantes</h2>
<video class="video" controls>
<source src="https://cdn.coverr.co/videos/coverr-gamer-playing-5172/1080p.mp4">
</video>
</div>

<div class="card">
<h2>Ativar acesso</h2>
<p>Pagamento PIX:</p>
<p><b>CPF:</b> 025.984.620-17</p>

<input id="codigo" placeholder="Digite o código">
<button onclick="validarCodigo()">Ativar</button>

<p id="status"></p>
</div>

<div class="card">
<h2>Ranking de usuários</h2>
<div id="ranking"></div>
</div>

<div class="card">
<h2>Login Admin</h2>
<input id="adminUser" placeholder="Usuário">
<input id="adminPass" type="password" placeholder="Senha">
<button onclick="loginAdmin()">Entrar</button>
</div>

<div class="card admin" id="adminPanel">
<h2>Painel Admin</h2>

<button onclick="gerarCodigo()">Gerar Código</button>
<p>Código gerado: <span class="code" id="novoCodigo"></span></p>

<h3>Clientes ativados</h3>
<div id="clientes"></div>
</div>

</div>

<script>

// detectar celular
let device = navigator.userAgent;
document.getElementById("device").innerText = device;

// HUD baseado em resolução
function detectarHUD(){
let w = screen.width;

if(w <= 720){
return "HUD Compacta (Celular básico)";
}
if(w <= 1080){
return "HUD Balanceada (Celular intermediário)";
}
return "HUD Avançada (Celular potente)";
}

document.getElementById("hud").innerText = detectarHUD();


// banco simples
let codigos = JSON.parse(localStorage.getItem("codigos")) || [];
let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

function salvar(){
localStorage.setItem("codigos", JSON.stringify(codigos));
localStorage.setItem("clientes", JSON.stringify(clientes));
}


// gerar código
function gerarCodigo(){
let code = "SP-" + Math.random().toString(36).substring(2,8).toUpperCase();
codigos.push(code);
salvar();
document.getElementById("novoCodigo").innerText = code;
}

// validar código
function validarCodigo(){
let c = document.getElementById("codigo").value;

if(codigos.includes(c)){
clientes.push({
codigo:c,
device:device
});

codigos = codigos.filter(x=>x!==c);
salvar();

document.getElementById("status").innerText = "Ativado com sucesso!";
mostrarClientes();
ranking();
}else{
document.getElementById("status").innerText = "Código inválido";
}
}


// login admin
function loginAdmin(){
let u = document.getElementById("adminUser").value;
let p = document.getElementById("adminPass").value;

if(u==="admin" && p==="admin123"){
document.getElementById("adminPanel").style.display="block";
mostrarClientes();
}else{
alert("Login errado");
}
}

// mostrar clientes
function mostrarClientes(){
let div = document.getElementById("clientes");
div.innerHTML="";

clientes.forEach(c=>{
div.innerHTML += "<p>"+c.codigo+" - "+c.device+"</p>";
});
}

// ranking
function ranking(){
let div = document.getElementById("ranking");
div.innerHTML="";

clientes.slice(0,10).forEach((c,i)=>{
div.innerHTML += `<div class="rank">#${i+1} Jogador - ${c.device}</div>`;
});
}

ranking();

</script>

</body>
  </html>
