<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Pro Sensi</title>

<style>
body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:430px;
background:#111827;
padding:25px;
border-radius:18px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

h1{
text-align:center;
margin-bottom:15px;
}

.card{
background:#020617;
padding:12px;
border-radius:10px;
margin-top:10px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.pix{
background:#064e3b;
padding:12px;
border-radius:10px;
margin-top:12px;
}

.free{
background:#1f2937;
padding:12px;
border-radius:10px;
margin-top:12px;
}

.lock{
background:#3f1d1d;
padding:12px;
border-radius:10px;
margin-top:12px;
}
</style>
</head>

<body>

<div class="container">

<h1>Painel Pro Sensibilidade</h1>

<div class="card" id="device">
Detectando celular...
</div>

<label>DPI</label>
<input type="number" id="dpi" placeholder="Ex: 400">

<label>Modo</label>
<select id="modo">
<option value="amostra">Amostra grátis</option>
<option value="pro">Sensi PRO (pago)</option>
</select>

<button onclick="gerar()">Gerar Sensibilidade</button>

<div class="card" id="resultado">
Aguardando...
</div>

<div class="free">
<b>Amostra grátis:</b><br>
Geral: 120<br>
Red Dot: 110<br>
2x: 100<br>
4x: 90
</div>

<div class="pix">
<b>Comprar Sensi PRO</b><br>
Valor: R$10<br><br>
Pix (CPF):<br>
<b>025.984.620-17</b><br><br>
Depois do pagamento clique abaixo.
<button onclick="liberar()">Já paguei no Pix</button>
</div>

<div class="lock" id="proLock">
Conteúdo PRO bloqueado
</div>

</div>

<script>

let liberado = false;

function detectarCelular(){
let ua = navigator.userAgent;
let modelo = "Não identificado";

if(ua.includes("SM-A025M")) modelo = "Samsung Galaxy A02";
else if(ua.includes("SM")) modelo = "Samsung";
else if(ua.includes("Moto")) modelo = "Motorola";
else if(ua.includes("Redmi")) modelo = "Xiaomi Redmi";
else if(ua.includes("Mi")) modelo = "Xiaomi Mi";
else if(ua.includes("iPhone")) modelo = "iPhone";

document.getElementById("device").innerHTML =
"<b>Celular detectado:</b> " + modelo +
"<br>Resolução: " + screen.width + "x" + screen.height;
}

detectarCelular();

function gerar(){

let dpi = parseInt(document.getElementById("dpi").value);
let modo = document.getElementById("modo").value;

if(!dpi){
alert("Digite o DPI");
return;
}

if(modo === "pro" && !liberado){
alert("Sensi PRO bloqueada. Faça o pagamento.");
return;
}

let base = modo === "pro" ? 150 : 120;

let geral = base + (dpi/20);
let redDot = base - 5 + (dpi/25);
let x2 = base - 15;
let x4 = base - 25;
let awm = base - 35;

function limite(v){
return Math.min(Math.round(v),200);
}

document.getElementById("resultado").innerHTML = `
<b>Sensibilidade Gerada</b><br><br>
Geral: ${limite(geral)}<br>
Red Dot: ${limite(redDot)}<br>
Mira 2x: ${limite(x2)}<br>
Mira 4x: ${limite(x4)}<br>
AWM: ${limite(awm)}<br><br>
DPI: ${dpi}
`;
}

function liberar(){
liberado = true;
document.getElementById("proLock").innerHTML =
"Conteúdo PRO liberado ✅";
alert("Sensi PRO liberada!");
}

</script>

</body>
</html>
